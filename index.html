<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Petra Cast - Technical Consultant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { 
            background: #1a1a1a; 
            color: #e5e5e5; 
            font-family: 'Inter', sans-serif; 
            overflow: hidden; 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
        .petra-glass { 
            background: rgba(30, 30, 30, 0.9); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            width: 100%;
            max-width: 600px;
            height: 95vh;
            display: flex;
            flex-direction: column;
        }
        .typing::after { content: '...'; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 0; } 50% { opacity: 1; } }

        /* Custom scrollbar sang trọng */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #c2a478; border-radius: 10px; }

        /* Gemini-style Textarea cho kỹ thuật viên */
        #chat-input {
            resize: none;
            min-height: 52px;
            max-height: 180px;
            scrollbar-width: none;
        }
        #chat-input::-webkit-scrollbar { display: none; }

        @media (max-width: 640px) {
            .petra-glass { height: 100vh; border-radius: 0; }
        }
    </style>
</head>
<body class="p-0 sm:p-4">

    <div class="petra-glass rounded-2xl overflow-hidden shadow-2xl flex flex-col">
        <div class="bg-[#c2a478] p-5 flex items-center justify-between shadow-lg">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 bg-black/20 rounded flex items-center justify-center">
                    <i data-lucide="component" class="text-white"></i>
                </div>
                <div>
                    <h1 class="text-lg font-bold uppercase tracking-tight text-white leading-none">Petra Design AI</h1>
                    <p class="text-[10px] text-white/80 uppercase tracking-widest font-black mt-1">Architectural Precast Specialist</p>
                </div>
            </div>
            <div class="text-right hidden sm:block text-white/80 text-[10px] font-bold">
                <p>TORONTO, ON</p>
                <p>PETRACAST.CA</p>
            </div>
        </div>

        <div id="chat-messages" class="flex-1 p-6 overflow-y-auto space-y-6 text-[15px] leading-relaxed">
            <div class="bg-[#c2a478]/10 border border-[#c2a478]/20 rounded-xl p-4 text-[#c2a478] shadow-sm">
                Welcome to Petra-Cast. I am your technical consultant for <strong>GFRC, UHPC, and Precast</strong> projects. How can I help you? I can speak all languages!
            </div>
        </div>

        <div class="p-4 bg-black/20 border-t border-white/5">
            <div class="relative flex items-end gap-2 bg-white/5 border border-white/10 rounded-2xl p-2 focus-within:border-[#c2a478] transition-all">
                <textarea id="chat-input" rows="1" placeholder="Ask me anything ..." 
                    class="flex-1 bg-transparent px-4 py-3 text-white placeholder-gray-500 focus:outline-none leading-relaxed"></textarea>
                
                <button onclick="sendMessage()" class="bg-[#c2a478] p-3 rounded-xl text-white hover:bg-[#b39366] active:scale-95 transition-all flex items-center justify-center mb-1 shadow-lg">
                    <i data-lucide="send-horizontal" class="w-5 h-5"></i>
                </button>
            </div>
            <p class="text-[9px] text-gray-500 text-center mt-2 uppercase tracking-widest font-medium">Petra Technical Support • 2026</p>
        </div>
    </div>

    <script>
        lucide.createIcons();
        const input = document.getElementById("chat-input");
        const chatBox = document.getElementById("chat-messages");

        // Tự động giãn chiều cao khi gõ nội dung kỹ thuật dài
        input.addEventListener("input", function() {
            this.style.height = "auto";
            this.style.height = (this.scrollHeight) + "px";
        });

        async function sendMessage() {
            const msg = input.value.trim();
            if (!msg) return;

            // User Message (Hỗ trợ xuống dòng)
            chatBox.innerHTML += `
                <div class="flex justify-end">
                    <div class="bg-[#333] p-4 rounded-2xl rounded-tr-none max-w-[85%] border border-white/5 shadow-sm">
                        ${msg.replace(/\n/g, '<br>')}
                    </div>
                </div>`;
            
            input.value = "";
            input.style.height = "52px"; // Reset chiều cao
            chatBox.scrollTop = chatBox.scrollHeight;

            // Loading
            const loadingId = "loading-" + Date.now();
            chatBox.innerHTML += `
                <div id="${loadingId}" class="flex justify-start">
                    <div class="bg-white/5 p-4 rounded-2xl rounded-tl-none italic text-gray-500 text-sm">
                        Consulting technical data<span class="typing"></span>
                    </div>
                </div>`;
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const res = await fetch("/api/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message: msg })
                });
                const data = await res.json();
                const loadingElement = document.getElementById(loadingId);
                if (loadingElement) loadingElement.remove();

                // AI Response
                chatBox.innerHTML += `
                    <div class="flex justify-start animate-in fade-in duration-500">
                        <div class="bg-white/10 border border-white/10 p-4 rounded-2xl rounded-tl-none max-w-[85%] text-gray-200 shadow-md leading-relaxed">
                            ${data.reply}
                        </div>
                    </div>`;
            } catch (e) {
                const loadingElement = document.getElementById(loadingId);
                if (loadingElement) loadingElement.remove();
                chatBox.innerHTML += `<div class="text-red-500 text-center text-xs font-bold py-2 uppercase">Connection error. Please contact Petra office.</div>`;
            }
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // Enter để gửi, Shift + Enter để xuống dòng
        input.addEventListener("keydown", (e) => { 
            if (e.key === "Enter" && !e.shiftKey) { 
                e.preventDefault();
                sendMessage(); 
            } 
        });
    </script>
</body>
</html>
