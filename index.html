<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Toronto Fitness Boss AI</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<style>
body {
background:#0b0f1a;
color:white;
font-family:sans-serif;
}

.glass{
background:rgba(17,24,39,0.95);
backdrop-filter:blur(10px);
border:1px solid rgba(59,130,246,0.2);
}

#chat-messages::-webkit-scrollbar{
display:none;
}
</style>

</head>

<body class="h-screen flex items-center justify-center p-4">

<div id="chatbot-panel" class="glass w-full max-w-md h-[600px] rounded-3xl overflow-hidden shadow-2xl flex flex-col">

<div class="bg-blue-600 p-5 flex items-center gap-4">
<div class="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center">
<i data-lucide="crown"></i>
</div>

<div>
<h1 class="text-sm font-black uppercase tracking-tighter">
Toronto Fitness Boss
</h1>

<p class="text-[10px] text-blue-200 uppercase font-bold">
Downtown Core AI
</p>
</div>
</div>

<div id="chat-messages" class="flex-1 p-4 overflow-y-auto space-y-4 text-sm">

<div class="bg-blue-500/20 border border-blue-500/30 rounded-2xl p-4 text-blue-100">
Yo! Toronto Fitness Boss đây. Tao chỉ tập trung vào Gym và Gains khu Downtown thôi. Hỏi lẹ đi bro!
</div>

</div>

<div class="p-4 bg-black/20 border-t border-white/5 flex gap-2">

<input
id="chat-input"
type="text"
placeholder="Hỏi Boss về Bathurst, College..."
class="flex-1 bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-blue-500">

<button onclick="sendMessage()" class="bg-blue-600 p-3 rounded-xl text-white">
<i data-lucide="send" class="w-5 h-5"></i>
</button>

</div>
</div>

<script>

lucide.createIcons()

async function sendMessage(){

const input=document.getElementById("chat-input")
const chatBox=document.getElementById("chat-messages")

const msg=input.value.trim()

if(!msg)return

chatBox.innerHTML+=`
<div class="flex justify-end">
<div class="bg-blue-600 p-3 rounded-2xl max-w-[80%]">${msg}</div>
</div>
`

input.value=""
chatBox.scrollTop=chatBox.scrollHeight

const loading=document.createElement("div")
loading.innerHTML="Boss đang suy nghĩ..."
chatBox.appendChild(loading)

try{

const res=await fetch("/api/chat",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
message:msg
})

})

const data=await res.json()

loading.remove()

chatBox.innerHTML+=`
<div class="flex justify-start">
<div class="bg-white/10 border border-white/10 p-3 rounded-2xl max-w-[80%]">
${data.reply}
</div>
</div>
`

chatBox.scrollTop=chatBox.scrollHeight

}catch(e){

loading.remove()

chatBox.innerHTML+=`
<div class="text-red-500 text-xs text-center">
Connection error
</div>
`

}

}

document
.getElementById("chat-input")
.addEventListener("keypress",(e)=>{

if(e.key==="Enter"){
sendMessage()
}

})

</script>

</body>
</html>
