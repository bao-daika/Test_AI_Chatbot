<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Petra Cast - Technical Consultant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background: #1a1a1a; color: #e5e5e5; font-family: 'Inter', sans-serif; }
        .petra-glass { background: rgba(30, 30, 30, 0.9); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .typing::after { content: '...'; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 0; } 50% { opacity: 1; } }
    </style>
</head>
<body class="h-screen flex items-center justify-center p-4">

    <div class="petra-glass w-full max-w-2xl h-[700px] rounded-2xl overflow-hidden shadow-2xl flex flex-col">
        <div class="bg-[#c2a478] p-5 flex items-center justify-between shadow-lg">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 bg-black/20 rounded flex items-center justify-center">
                    <i data-lucide="component" class="text-white"></i>
                </div>
                <div>
                    <h1 class="text-lg font-bold uppercase tracking-tight text-white">Petra Design AI</h1>
                    <p class="text-[10px] text-white/80 uppercase tracking-widest font-semibold">Architectural Precast Specialist</p>
                </div>
            </div>
            <div class="text-right hidden sm:block text-white/80 text-[10px]">
                <p>Toronto, ON</p>
                <p>petracast.ca</p>
            </div>
        </div>

        <div id="chat-messages" class="flex-1 p-6 overflow-y-auto space-y-6 text-[15px] leading-relaxed">
            <div class="bg-[#c2a478]/10 border border-[#c2a478]/20 rounded-xl p-4 text-[#c2a478]">
                Welcome to Petra-Cast. I am your technical consultant for <strong>GFRC, UHPC, and Precast</strong> projects. How can I help you ? I can speak all languages !
            </div>
        </div>

        <div class="p-6 bg-black/20 border-t border-white/5 flex gap-3">
            <input id="chat-input" type="text" placeholder="Ask about anything ..." 
                class="flex-1 bg-white/5 border border-white/10 rounded-lg px-4 py-4 text-white focus:outline-none focus:border-[#c2a478] transition-all">
            <button onclick="sendMessage()" class="bg-[#c2a478] px-6 rounded-lg text-white font-bold hover:bg-[#b39366] active:scale-95 transition-all">
                SEND
            </button>
        </div>
    </div>

    <script>
        lucide.createIcons();
        const input = document.getElementById("chat-input");
        const chatBox = document.getElementById("chat-messages");

        async function sendMessage() {
            const msg = input.value.trim();
            if (!msg) return;

            // User Message
            chatBox.innerHTML += `<div class="flex justify-end"><div class="bg-[#333] p-4 rounded-2xl rounded-tr-none max-w-[85%] border border-white/5 shadow-sm">${msg}</div></div>`;
            input.value = "";
            chatBox.scrollTop = chatBox.scrollHeight;

            // Loading
            const loadingId = "loading-" + Date.now();
            chatBox.innerHTML += `<div id="${loadingId}" class="flex justify-start"><div class="bg-white/5 p-4 rounded-2xl rounded-tl-none italic text-gray-500">Consulting technical data<span class="typing"></span></div></div>`;
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const res = await fetch("/api/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message: msg })
                });
                const data = await res.json();
                document.getElementById(loadingId).remove();

                // AI Response
                chatBox.innerHTML += `<div class="flex justify-start animate-in fade-in duration-500"><div class="bg-white/10 border border-white/10 p-4 rounded-2xl rounded-tl-none max-w-[85%] text-gray-200 shadow-md">${data.reply}</div></div>`;
            } catch (e) {
                document.getElementById(loadingId).remove();
                chatBox.innerHTML += `<div class="text-red-500 text-center text-xs">Connection error. Please contact Petra office.</div>`;
            }
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        input.addEventListener("keypress", (e) => { if (e.key === "Enter") sendMessage(); });
    </script>
</body>
</html>
